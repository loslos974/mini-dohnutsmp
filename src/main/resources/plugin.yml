name: EconomyPlugin
version: 1.0.0
main: com.example.Main
api-version: "1.21"
commands:
  pay:
    description: Pay money
  money:
    description: Check balance
  menu:
    description: Main server menu
  grant:
    description: Grant money or tokens to a player (admin only)
    usage: /grant <money|tokens> <player> <amount>
    permission: economyplugin.admin
permissions:
  economyplugin.admin:
    description: Allows use of admin economy commands such as /grant
    default: op